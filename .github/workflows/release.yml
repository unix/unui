name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and publish release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: Publish npm packages
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use the supported npm CLI
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/release
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist/release

      - name: Test npm release tooling
        run: node --test npm/scripts/lib.test.mjs

      - name: Build npm packages
        run: |
          node npm/scripts/build-packages.mjs \
            --version "$GITHUB_REF_NAME" \
            --assets dist/release \
            --output dist/npm

      - name: Verify npm packages
        run: |
          node npm/scripts/verify-packages.mjs \
            --directory dist/npm \
            --for-publish

      - name: Publish npm packages with Trusted Publishing
        run: |
          node npm/scripts/publish-packages.mjs \
            --directory dist/npm \
            --trusted-publishing
