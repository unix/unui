# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: unui

builds:
  - id: unui
    main: ./cmd/unui
    binary: unui
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/unix/unui-cli/internal/buildinfo.Version={{ .Version }}
        -X github.com/unix/unui-cli/internal/buildinfo.Commit={{ .FullCommit }}
        -X github.com/unix/unui-cli/internal/buildinfo.Date={{ .CommitDate }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: unui
    ids:
      - unui
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-devel-{{ .ShortCommit }}"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

release:
  prerelease: auto
