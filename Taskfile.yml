version: "3"

tasks:
  default:
    desc: Run the local quality checks
    cmds:
      - task: check

  format:
    desc: Format Go code and organize imports
    cmd: go tool goimports -w .

  lint:
    desc: Run Staticcheck
    cmd: go tool staticcheck ./...

  test:
    desc: Run all Go tests
    cmd: go test ./...

  check:
    desc: Format, lint, and test the CLI
    cmds:
      - task: format
      - task: lint
      - task: test

  build:
    desc: Build the CLI for the current platform
    dir: dist
    cmd: go build -trimpath -o ./unui{{exeExt}} ../cmd/unui

  dev-bin:
    desc: Build and link the local CLI into ~/.local/bin
    platforms:
      - darwin
      - linux
    deps:
      - build
    vars:
      DEV_BIN: "{{.HOME}}/.local/bin/unui{{exeExt}}"
      DEV_TARGET: "{{.ROOT_DIR}}/dist/unui{{exeExt}}"
    cmds:
      - |
        set -eu
        if [ -L "{{.DEV_BIN}}" ] && [ "$(readlink "{{.DEV_BIN}}")" = "{{.DEV_TARGET}}" ]; then
          echo "unUI dev bin already links to {{.DEV_TARGET}}"
          exit 0
        fi
        if [ -e "{{.DEV_BIN}}" ] || [ -L "{{.DEV_BIN}}" ]; then
          echo "Refusing to replace the existing file at {{.DEV_BIN}}" >&2
          exit 1
        fi
        mkdir -p "{{.HOME}}/.local/bin"
        ln -s "{{.DEV_TARGET}}" "{{.DEV_BIN}}"
        echo "Linked {{.DEV_BIN}} to {{.DEV_TARGET}}"

  dev-bin-remove:
    desc: Remove the local CLI link from ~/.local/bin
    platforms:
      - darwin
      - linux
    vars:
      DEV_BIN: "{{.HOME}}/.local/bin/unui{{exeExt}}"
      DEV_TARGET: "{{.ROOT_DIR}}/dist/unui{{exeExt}}"
    cmds:
      - |
        set -eu
        if [ ! -L "{{.DEV_BIN}}" ]; then
          if [ -e "{{.DEV_BIN}}" ]; then
            echo "Refusing to remove the non-link file at {{.DEV_BIN}}" >&2
            exit 1
          fi
          echo "No unUI dev bin link exists at {{.DEV_BIN}}"
          exit 0
        fi
        if [ "$(readlink "{{.DEV_BIN}}")" != "{{.DEV_TARGET}}" ]; then
          echo "Refusing to remove a link that does not point to {{.DEV_TARGET}}" >&2
          exit 1
        fi
        unlink "{{.DEV_BIN}}"
        echo "Removed {{.DEV_BIN}}"

  build-info:
    desc: Inspect the metadata embedded in a local CLI build
    deps:
      - build
    dir: dist
    cmds:
      - go version -m ./unui{{exeExt}}
      - ./unui{{exeExt}} --version --json

  release-check:
    desc: Validate the GoReleaser configuration without publishing
    cmds:
      - goreleaser check
      - task: npm-test

  release-snapshot:
    desc: Build release artifacts locally without publishing
    cmd: goreleaser release --snapshot --clean

  npm-test:
    desc: Test the npm release tooling
    cmd: node --test npm/scripts/lib.test.mjs

  npm-package:
    desc: Build npm packages from the archives in dist
    requires:
      vars:
        - VERSION
    cmd: node npm/scripts/build-packages.mjs --version {{.VERSION}}

  npm-package-check:
    desc: Build and verify npm packages without publishing
    requires:
      vars:
        - VERSION
    cmds:
      - task: npm-package
        vars:
          VERSION: "{{.VERSION}}"
      - node npm/scripts/verify-packages.mjs

  npm-trust-verify:
    desc: Verify Trusted Publishing for every npm package
    cmd: node npm/scripts/configure-trusted-publishing.mjs --verify

  npm-token-restrictions:
    desc: Preview commands that disallow traditional npm publishing tokens
    cmd: node npm/scripts/restrict-token-publishing.mjs
