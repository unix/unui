version: '3'

tasks:
  default:
    desc: Run the local quality checks
    cmds:
      - task: check

  format:
    desc: Format Go code and organize imports
    cmd: go tool goimports -w .

  lint:
    desc: Run Staticcheck
    cmd: go tool staticcheck ./...

  test:
    desc: Run all Go tests
    cmd: go test ./...

  check:
    desc: Format, lint, and test the CLI
    cmds:
      - task: format
      - task: lint
      - task: test

  build:
    desc: Build the CLI for the current platform
    dir: dist
    cmd: go build -trimpath -o ./unui{{exeExt}} ../cmd/unui

  build-info:
    desc: Inspect the metadata embedded in a local CLI build
    deps:
      - build
    dir: dist
    cmds:
      - go version -m ./unui{{exeExt}}
      - ./unui{{exeExt}} version --json

  release-check:
    desc: Validate the GoReleaser configuration without publishing
    cmd: goreleaser check

  release-snapshot:
    desc: Build release artifacts locally without publishing
    cmd: goreleaser release --snapshot --clean
